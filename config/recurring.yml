development:
  token_discovery:
    class: TokenDiscoveryJob
    queue: token_discovery
    schedule: every 30 seconds

  price_updates:
    class: TokenPriceUpdateJob
    queue: token_scan
    schedule: every 60 seconds

  daily_scan_reset:
    class: DailyScanResetJob
    queue: default
    schedule: at midnight every day

production:
  token_discovery:
    class: TokenDiscoveryJob
    queue: token_discovery
    schedule: every 15 seconds

  price_updates:
    class: TokenPriceUpdateJob
    queue: token_scan
    schedule: every 60 seconds

  daily_scan_reset:
    class: DailyScanResetJob
    queue: default
    schedule: at midnight every day

  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12
